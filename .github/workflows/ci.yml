name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint and test (pwsh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester and PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer (fail on Error severity)
        shell: pwsh
        run: |
          $files = @(
            './AdAutomation.psm1'
            './tests/AdAutomation.Tests.ps1'
          )
          $results = foreach ($f in $files) { Invoke-ScriptAnalyzer -Path $f }
          $results | Format-Table -AutoSize
          $errors = @($results | Where-Object Severity -eq 'Error')
          if ($errors.Count -gt 0) {
            Write-Host "PSScriptAnalyzer found $($errors.Count) Error-severity issue(s)." -ForegroundColor Red
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no Error-severity findings." -ForegroundColor Green

      - name: Run Pester
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config
